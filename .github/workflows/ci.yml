name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # kahlua-runtime.jar ships class-file version 69 (Java 25) matching
        # PZ's bundled JDK. Older JDKs can't compile against it.
        java: ['25']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Run example tests (bash)
        if: runner.os != 'Windows'
        run: |
          chmod +x pztest
          cd examples/MyMod
          ../../pztest

      - name: Run example tests (PowerShell)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd examples/MyMod
          ..\..\pztest.ps1
